name: CI/CD Production Pipeline

on:
  push:
    branches:
      - main

jobs:
  continuous-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-node-version: '3.11'

      - name: Install Linting & Testing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Run Code Lint Check (Quality Gate)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  continuous-deployment:
    needs: continuous-integration
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Code to AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to the application folder
            cd /home/ubuntu/app
            
            # Pull the latest changes from GitHub
            git pull origin main
            
            # Sync dependencies within virtual environment
            source venv/bin/activate
            pip install -r requirements.txt
            
            # Restart the service to apply changes instantly
            sudo systemctl restart fastapi
